# Nael Security Scanner Configuration
scan_timeout: 15
max_redirects: 5
user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
verify_ssl: true
threads: 4
enable_network_diagnostics: true

# Export settings
export_formats:
  - json
  - html

# Logging
logging:
  enabled: true
  level: INFO

# Scan modules
modules:
  security_headers: true
  ssl_tls: true
  dns_whois: true
  html: true
  performance: true
  network: true

# Scoring weights
scoring:
  ssl_weight: 25
  headers_weight: 25
  dns_weight: 15
  html_weight: 15
  performance_weight: 10
  network_weight: 10